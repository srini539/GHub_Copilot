<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Snake Game</h1>
        <div class="info">
            <div class="score">Score: <span id="score">0</span></div>
            <div class="highScore">High Score: <span id="highScore">0</span></div>
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="controls">
            <button id="startBtn">Start Game</button>
            <button id="pauseBtn">Pause</button>
            <button id="resetBtn">Reset</button>
        </div>
        <div class="instructions">
            <p><strong>How to Play:</strong></p>
            <ul>
                <li>Use Arrow Keys or WASD to move the snake</li>
                <li>Eat the red food to grow</li>
                <li>Don't hit the walls or yourself</li>
                <li>Each food eaten = 10 points</li>
            </ul>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
